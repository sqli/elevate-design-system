# Platform.sh / Upsun routes configuration
# Documentation: https://docs.platform.sh/define-routes.html

# Main route - serves Storybook
"https://{default}/":
  type: upstream
  upstream: "storybook:http"
  cache:
    enabled: true
    default_ttl: 86400
    cookies: []
    headers:
      - Accept
      - Accept-Language

# Redirect www to non-www
"https://www.{default}/":
  type: redirect
  to: "https://{default}/"
