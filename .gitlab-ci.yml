# SQLI Design System - GitLab CI/CD

stages:
  - install
  - test
  - build
  - publish
  - deploy

variables:
  NODE_VERSION: "20"
  NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/.npm"

# Cache node_modules between jobs
.node_cache:
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
      - .npm/

# Base template for Node.js jobs
.node_template:
  image: node:${NODE_VERSION}
  extends: .node_cache
  before_script:
    - npm ci --prefer-offline

# =============================================================================
# Install
# =============================================================================

install:
  extends: .node_template
  stage: install
  script:
    - npm ci
  artifacts:
    paths:
      - node_modules/
    expire_in: 1 hour

# =============================================================================
# Test
# =============================================================================

lint:css:
  extends: .node_template
  stage: test
  script:
    - npm run lint:css
  allow_failure: false
  rules:
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"

lint:js:
  extends: .node_template
  stage: test
  script:
    - npm run lint:js
  allow_failure: false
  rules:
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"

format:check:
  extends: .node_template
  stage: test
  script:
    - npm run format
  allow_failure: true
  rules:
    - if: $CI_MERGE_REQUEST_IID

test:unit:
  extends: .node_template
  stage: test
  script:
    - npm run test -- --run --coverage
  coverage: '/All files[^|]*\|[^|]*\s+([\d\.]+)/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: .coverage/cobertura-coverage.xml
    paths:
      - .coverage/
    expire_in: 1 week
  rules:
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"

test:a11y:
  extends: .node_template
  stage: test
  script:
    - npm run test:a11y
  allow_failure: false
  rules:
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_COMMIT_BRANCH == "main"

check:bundlesize:
  extends: .node_template
  stage: test
  script:
    - npm run check:size
  allow_failure: false
  rules:
    - if: $CI_MERGE_REQUEST_IID

# =============================================================================
# Build
# =============================================================================

build:css:
  extends: .node_template
  stage: build
  script:
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 week
  only:
    - merge_requests
    - main
    - develop
    - tags

build:storybook:
  extends: .node_template
  stage: build
  script:
    - npm run build-storybook
  artifacts:
    paths:
      - storybook-static/
    expire_in: 1 week
  only:
    - merge_requests
    - main
    - develop

# =============================================================================
# Publish to npm registry
# =============================================================================

publish:
  extends: .node_template
  stage: publish
  script:
    - npm run build
    # Configure npm for GitLab registry
    - |
      echo "@sqli:registry=https://gitlab.paris.sqli.com/api/v4/projects/${CI_PROJECT_ID}/packages/npm/" > .npmrc
      echo "//gitlab.paris.sqli.com/api/v4/projects/${CI_PROJECT_ID}/packages/npm/:_authToken=${CI_JOB_TOKEN}" >> .npmrc
    - npm publish
  only:
    - tags
  when: manual
  environment:
    name: npm-registry

# Semantic Release - Automatic versioning and publishing
release:
  extends: .node_template
  stage: publish
  script:
    - npm run build
    # Configure npm for GitLab registry
    - |
      echo "@sqli:registry=https://gitlab.paris.sqli.com/api/v4/projects/${CI_PROJECT_ID}/packages/npm/" > .npmrc
      echo "//gitlab.paris.sqli.com/api/v4/projects/${CI_PROJECT_ID}/packages/npm/:_authToken=${CI_JOB_TOKEN}" >> .npmrc
    - npm run release
  only:
    - main
  when: manual
  environment:
    name: production

# =============================================================================
# Deploy Storybook to GitLab Pages
# =============================================================================

pages:
  extends: .node_template
  stage: deploy
  script:
    - npm run build-storybook
    - mv storybook-static public
  artifacts:
    paths:
      - public
  only:
    - main
  environment:
    name: gitlab-pages
    url: https://$CI_PROJECT_NAMESPACE.gitlab.paris.sqli.com/$CI_PROJECT_NAME
